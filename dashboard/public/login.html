<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Phone Server</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">⬡</span>
      <h1>Phone Server</h1>
      <p>Secure admin dashboard</p>
    </div>
    <form id="login-form">
      <label>
        Username
        <input type="text" name="username" required autocomplete="username" placeholder="admin">
      </label>
      <label>
        Password
        <div class="password-wrap">
          <input type="password" name="password" id="password-input" required autocomplete="current-password" placeholder="••••••••">
          <button type="button" class="password-toggle" id="toggle-password">Show</button>
        </div>
      </label>
      <button type="submit" class="btn" style="width:100%;margin-top:0.5rem">Sign in</button>
      <p id="login-error" class="error-msg hidden"></p>
    </form>
    <p class="hint" style="text-align:center;margin-top:1.5rem">Access via Cloudflare Tunnel only.<br>Not reachable on local Wi‑Fi when secured.</p>
  </div>
  <script>
    document.getElementById('toggle-password').addEventListener('click', () => {
      const input = document.getElementById('password-input');
      const btn = document.getElementById('toggle-password');
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const errEl = document.getElementById('login-error');
      errEl.classList.add('hidden');
      const btn = e.target.querySelector('[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') }),
        });
        if (res.ok) { window.location.href = '/'; return; }
        const data = await res.json();
        errEl.textContent = data.error || 'Login failed';
        errEl.classList.remove('hidden');
      } catch {
        errEl.textContent = 'Network error';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
