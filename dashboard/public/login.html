<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Phone Server</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-icon">⬡</span>
      <h1>Phone Server</h1>
      <p>Secure admin dashboard</p>
    </div>
    <form id="login-form" method="post" action="/login.html">
      <label>
        Username
        <input type="text" name="username" required autocomplete="username" placeholder="admin">
      </label>
      <label>
        Password
        <div class="password-wrap">
          <input type="password" name="password" id="password-input" required autocomplete="current-password" placeholder="••••••••">
          <button type="button" class="password-toggle" id="toggle-password">Show</button>
        </div>
      </label>
      <button type="submit" class="btn" style="width:100%;margin-top:0.5rem">Sign in</button>
      <p id="login-error" class="error-msg hidden"></p>
    </form>
    <p class="hint" style="text-align:center;margin-top:1.5rem">Access via Cloudflare Tunnel only.<br>Not reachable on local Wi‑Fi when secured.</p>
  </div>
  <script src="/js/login.js"></script>
</body>
</html>
